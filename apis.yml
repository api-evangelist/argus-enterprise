aid: argus-enterprise
name: ARGUS Enterprise
description: >-
  ARGUS Enterprise is the industry-standard commercial property valuation and cash flow
  forecasting software by Altus Group, now integrated into the ARGUS Intelligence Platform.
  It provides lease-by-lease cash flow modeling, property valuations using DCF and yield-based
  methods, budgeting and forecasting, scenario testing, and 40+ industry-standard reports.
  Trusted by real estate investors, portfolio managers, valuation professionals, and asset
  managers worldwide and taught at 200+ universities.
